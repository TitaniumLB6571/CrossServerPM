# Example CrossServerPM config for a fake Titan network using MySQL.
#
# For easier copy/paste examples, see:
# - resources/examples/mysql.yml
# - resources/examples/relay.yml
# - resources/examples/redis.yml
# - resources/examples/file.yml
#
# Copy one example into plugin_data/CrossServerPM/config.yml.
#
# Use the same network.id, network.secret, and transport backend on every
# linked server. Change only server.id and server.display-name per server.

enabled: true
transport: mysql

network:
  id: "titan-network"
  secret: "copy-this-same-long-secret-to-every-titan-server"
  # Optional. This lets /xmsg servers show both connected and not connected servers.
  servers:
    survival: "Titan Survival"
    skyblock: "Titan Skyblock"
    factions: "Titan Factions"

server:
  # This example is for the survival server.
  # On another server, change this to "skyblock", "factions", etc.
  id: "survival"
  display-name: "Titan Survival"

mysql:
  host: "mysql.titanhosting.example"
  port: 3306
  database: "titan_crossserverpm"
  username: "titan_crossserverpm"
  password: "fake-password-change-this"
  table-prefix: "cspm_"
  timeout-seconds: 3

relay:
  # Ignored by this MySQL example.
  # This must point to the relay service, not just a normal Minecraft address.
  url: "https://relay.titan-network.example"
  access-key: "optional-fake-relay-access-key"
  timeout-seconds: 3

redis:
  # Ignored by this MySQL example.
  host: "redis.titanhosting.example"
  port: 6379
  username: ""
  password: "fake-redis-password-change-this"
  database: 0
  key-prefix: "cspm"
  timeout-seconds: 3

file:
  # Ignored by this MySQL example.
  # All linked servers must be able to read/write this same folder.
  path: "/home/minecraft/shared-crossserverpm"

updater:
  enabled: true
  plugin-name: "CrossServerPM"
  # Leave empty to use plugin.yml version. Only set this for custom builds.
  current-version: ""
  notify-console: true
  notify-ops: true
  check-interval-hours: 12
  include-prereleases: false
  timeout-seconds: 5
  # Set true only if your PHP has CA certificates configured.
  verify-tls: false
  api-url: "https://poggit.pmmp.io/releases.json"

runtime:
  poll-interval-seconds: 1
  heartbeat-interval-seconds: 5
  stale-presence-seconds: 15
  message-ttl-seconds: 30
  max-message-length: 256
  command-cooldown-seconds: 1
  allow-console-messaging: false
  console-name: "Console"

messages:
  prefix: "§1§lCross§6PM§r §8>§r"
  incoming-remote: "{prefix} §7[§b{server}§7] §f{sender} §7-> §eMe§7: §f{message}"
  outgoing-remote: "{prefix} §7[§b{server}§7] §eYou §7-> §f{target}§7: §f{message}"
  incoming-local: "{prefix} §f{sender} §7-> §eMe§7: §f{message}"
  outgoing-local: "{prefix} §eYou §7-> §f{target}§7: §f{message}"
  usage-msg: "{prefix} §cUsage: /msg <player> <message>"
  usage-reply: "{prefix} §cUsage: /reply <message>"
  player-only: "{prefix} §cThis command can only be used in-game."
  console-disabled: "{prefix} §cConsole messaging is disabled in config.yml."
  not-configured: "{prefix} §cCross-server messaging is not configured. Ask an admin to set enabled, network.secret, and transport settings."
  target-not-found: "{prefix} §cThat player is not online on any linked server."
  no-reply-target: "{prefix} §cNo one has messaged you yet."
  message-too-long: "{prefix} §cThat message is too long. Max length: {max} characters."
  cooldown: "{prefix} §cPlease wait before sending another message."
  send-failed: "{prefix} §cMessage failed: {reason}"
  reload-complete: "{prefix} §aConfiguration reloaded."
  update-check-started: "{prefix} §7Checking Poggit for updates..."
  update-available: "{prefix} §eUpdate available: §f{current} §7-> §a{latest}§7. Download: §b{url}"
  update-none: "{prefix} §aCrossServerPM is up to date. Current version: §f{version}"
  update-no-release: "{prefix} §eNo compatible Poggit release was found yet. {reason}"
  update-check-failed: "{prefix} §cUpdate check failed: {reason}"
